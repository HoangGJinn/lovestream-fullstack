<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thay đổi mật khẩu - LoveStream</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/profile.css">
    <link rel="stylesheet" href="/css/user-menu.css">
</head>
<body>

<div style="height: 70px; display: flex; align-items: center; padding: 0 40px; border-bottom: 1px solid #e5e5e5; background: #fff;">
    <a href="/home" style="color: #e50914; font-size: 28px; font-weight: 900; text-decoration: none; letter-spacing: -1px;">LoveStream</a>
    <div style="margin-left: auto;" th:insert="~{fragments/user-menu :: userMenu(${currentUser}, 'light')}"></div>
</div>

<div class="profile-container">
    <div class="sidebar">
        <a href="/account" class="logo-link"><i class="fa-solid fa-arrow-left"></i> Quay lại tài khoản</a>
        <ul class="menu-list">
            <li><a href="/account" class="menu-item active"><i class="fa-solid fa-house"></i> Tổng quan</a></li>
            <li><a href="#" class="menu-item"><i class="fa-regular fa-credit-card"></i> Tư cách thành viên</a></li>
            <li><a href="#" class="menu-item"><i class="fa-solid fa-shield-halved"></i> Bảo mật</a></li>
            <li><a href="#" class="menu-item"><i class="fa-solid fa-laptop-mobile"></i> Thiết bị</a></li>
            <li><a href="/profile" class="menu-item"><i class="fa-solid fa-users"></i> Hồ sơ</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h1 class="page-title">Thay đổi mật khẩu</h1>
        <p class="page-subtitle">Nhập mật khẩu cũ và mật khẩu mới để cập nhật tài khoản.</p>

        <div class="edit-form-card">
            <p id="change-password-error" class="field-error" style="display: none;"></p>

            <form id="changePasswordForm" class="edit-form">
                <div class="form-group">
                    <label for="oldPassword">Mật khẩu cũ</label>
                    <input id="oldPassword" type="password" autocomplete="current-password" required>
                </div>

                <div class="form-group">
                    <label for="newPassword">Mật khẩu mới</label>
                    <input id="newPassword" type="password" autocomplete="new-password" required>
                </div>

                <div class="form-group">
                    <label for="confirmNewPassword">Nhập lại mật khẩu mới</label>
                    <input id="confirmNewPassword" type="password" autocomplete="new-password" required>
                </div>

                <div class="form-actions">
                    <a href="/account" class="btn-cancel">Hủy</a>
                    <button type="submit" class="btn-save">Xác nhận</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('changePasswordForm').addEventListener('submit', async function (event) {
        event.preventDefault();

        const errorEl = document.getElementById('change-password-error');
        errorEl.style.display = 'none';

        const payload = {
            oldPassword: document.getElementById('oldPassword').value,
            newPassword: document.getElementById('newPassword').value,
            confirmNewPassword: document.getElementById('confirmNewPassword').value
        };

        try {
            const response = await fetch('/api/v1/password/change', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if (response.ok) {
                window.location.href = data.redirectUrl || '/login';
                return;
            }

            errorEl.textContent = data.error || 'Đổi mật khẩu thất bại. Vui lòng thử lại.';
            errorEl.style.display = 'block';
        } catch (error) {
            errorEl.textContent = 'Lỗi kết nối đến máy chủ.';
            errorEl.style.display = 'block';
        }
    });
</script>

</body>
</html>
