<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa hồ sơ - LoveStream</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/profile.css">
    <link rel="stylesheet" href="/css/user-menu.css">
</head>
<body>

<div style="height: 70px; display: flex; align-items: center; padding: 0 40px; border-bottom: 1px solid #e5e5e5; background: #fff;">
    <a href="/home" style="color: #e50914; font-size: 28px; font-weight: 900; text-decoration: none; letter-spacing: -1px;">LoveStream</a>
    <div style="margin-left: auto;" th:insert="~{fragments/user-menu :: userMenu(${currentUser}, 'light')}"></div>
</div>

<div class="profile-container">

    <div class="sidebar">
        <a href="/profile" class="logo-link"><i class="fa-solid fa-arrow-left"></i> Quay lại hồ sơ</a>

        <ul class="menu-list">
            <li><a href="/account" class="menu-item"><i class="fa-solid fa-house"></i> Tổng quan</a></li>
            <li><a href="#" class="menu-item"><i class="fa-regular fa-credit-card"></i> Tư cách thành viên</a></li>
            <li><a href="#" class="menu-item"><i class="fa-solid fa-shield-halved"></i> Bảo mật</a></li>
            <li><a href="#" class="menu-item"><i class="fa-solid fa-laptop-mobile"></i> Thiết bị</a></li>
            <li><a href="/profile" class="menu-item active"><i class="fa-solid fa-users"></i> Hồ sơ</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h1 class="page-title">Chỉnh sửa hồ sơ</h1>
        <p class="page-subtitle">Cập nhật thông tin tài khoản của bạn</p>

        <div class="edit-form-card">
            <div class="success-alert" th:if="${successMessage}" th:text="${successMessage}">Cập nhật thành công</div>

            <form th:action="@{/profile/edit}" th:object="${profileForm}" method="post" class="edit-form">
                <div class="form-group">
                    <label for="fullName">Họ và tên</label>
                    <input id="fullName" type="text" th:field="*{fullName}" placeholder="Nhập họ và tên">
                    <p class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">Lỗi họ tên</p>
                </div>

                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input id="phone" type="text" th:field="*{phone}" placeholder="Ví dụ: 0901234567">
                    <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}">Lỗi số điện thoại</p>
                </div>

                <div class="form-group">
                    <label for="gender">Giới tính</label>
                    <select id="gender" th:field="*{gender}">
                        <option th:value="${null}">Chưa chọn</option>
                        <option th:each="gender : ${genderOptions}" th:value="${gender}" th:text="${gender}"></option>
                    </select>
                    <p class="field-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}">Lỗi giới tính</p>
                </div>

                <div class="form-group">
                    <label for="avatar">Link avatar</label>
                    <input id="avatar" type="text" th:field="*{avatar}" placeholder="https://...">
                    <p class="field-error" th:if="${#fields.hasErrors('avatar')}" th:errors="*{avatar}">Lỗi avatar</p>
                </div>

                <div class="form-actions">
                    <a href="/profile" class="btn-cancel">Hủy</a>
                    <button type="submit" class="btn-save">Lưu thay đổi</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
