<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu dự phòng - LoveStream</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>

<div style="height: 70px; display: flex; align-items: center; padding: 0 40px; border-bottom: 1px solid #e5e5e5; background: #fff;">
    <a href="/login" style="color: #e50914; font-size: 28px; font-weight: 900; text-decoration: none; letter-spacing: -1px;">LoveStream</a>
</div>

<div style="max-width: 720px; margin: 40px auto; padding: 0 20px;">
    <h1 class="page-title" style="font-size: 34px;">Đổi mật khẩu bằng link dự phòng</h1>
    <p class="page-subtitle">Link này có hiệu lực trong 1 ngày kể từ lúc email được gửi.</p>

    <div class="edit-form-card">
        <p id="backup-password-error" class="field-error" th:if="${errorMessage}" th:text="${errorMessage}">Đường dẫn không hợp lệ</p>

        <form id="backupChangePasswordForm" th:if="${backupChangePasswordForm != null}" class="edit-form">
            <input id="backupToken" type="hidden" th:value="${backupChangePasswordForm.token}">

            <div class="form-group">
                <label for="newPassword">Mật khẩu mới</label>
                <input id="newPassword" type="password" autocomplete="new-password" required>
            </div>

            <div class="form-group">
                <label for="confirmNewPassword">Nhập lại mật khẩu mới</label>
                <input id="confirmNewPassword" type="password" autocomplete="new-password" required>
            </div>

            <div class="form-actions">
                <a href="/login" class="btn-cancel">Quay lại đăng nhập</a>
                <button type="submit" class="btn-save">Xác nhận</button>
            </div>
        </form>
    </div>
</div>

<script>
    const backupForm = document.getElementById('backupChangePasswordForm');
    if (backupForm) {
        backupForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            let errorEl = document.getElementById('backup-password-error');
            if (!errorEl) {
                errorEl = document.createElement('p');
                errorEl.id = 'backup-password-error';
                errorEl.className = 'field-error';
                backupForm.parentElement.insertBefore(errorEl, backupForm);
            }
            errorEl.style.display = 'none';

            const payload = {
                token: document.getElementById('backupToken').value,
                newPassword: document.getElementById('newPassword').value,
                confirmNewPassword: document.getElementById('confirmNewPassword').value
            };

            try {
                const response = await fetch('/api/v1/password/backup-change', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (response.ok) {
                    window.location.href = data.redirectUrl || '/login';
                    return;
                }

                errorEl.textContent = data.error || 'Đổi mật khẩu thất bại. Vui lòng thử lại.';
                errorEl.style.display = 'block';
            } catch (error) {
                errorEl.textContent = 'Lỗi kết nối đến máy chủ.';
                errorEl.style.display = 'block';
            }
        });
    }
</script>

</body>
</html>
