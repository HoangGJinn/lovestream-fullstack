<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - LoveStream</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #141414; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background-color: rgba(0,0,0,0.75); padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; }
        .login-box h2 { margin-bottom: 10px; }
        .description { font-size: 14px; color: #b3b3b3; margin-bottom: 20px; line-height: 1.5;}
        .form-group { margin-bottom: 15px; }
        .form-control { width: 100%; padding: 12px; border: none; border-radius: 4px; background: #333; color: white; box-sizing: border-box;}
        .btn-login { width: 100%; padding: 12px; background-color: #e50914; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px;}
        .btn-login:hover { background-color: #f40612; }
        .btn-login:disabled { background-color: #555; cursor: not-allowed; }
        .error-message { color: #e87c03; margin-bottom: 15px; font-size: 14px; display: none; }
        .success-message { color: #28a745; margin-bottom: 15px; font-size: 14px; display: none; }
        .links { margin-top: 20px; display: flex; justify-content: center; font-size: 14px; }
        .links a { color: #b3b3b3; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Quên mật khẩu</h2>
    <p class="description">
        Vui lòng nhập địa chỉ email bạn đã sử dụng để đăng ký. Chúng tôi sẽ gửi cho bạn một mã xác minh để đặt lại mật khẩu.
    </p>

    <div id="error-alert" class="error-message"></div>
    <div id="success-alert" class="success-message"></div>

    <form id="forgotPasswordForm">
        <div class="form-group">
            <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
        </div>
        <button type="submit" class="btn-login" id="submitBtn">Gửi mã xác nhận</button>
    </form>

    <div class="links">
        <a href="/login">Quay lại trang Đăng nhập</a>
    </div>
</div>

<script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', async function(event) {
        event.preventDefault();

        const email = document.getElementById('email').value;
        const errorAlert = document.getElementById('error-alert');
        const successAlert = document.getElementById('success-alert');
        const submitBtn = document.getElementById('submitBtn');

        errorAlert.style.display = 'none';
        successAlert.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.innerText = 'Đang gửi...';

        try {
            const response = await fetch('/api/v1/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });

            const data = await response.json();

            if (response.ok) {
                successAlert.innerText = data.message || 'Mã xác nhận đã được gửi đến email của bạn.';
                successAlert.style.display = 'block';
                document.getElementById('email').value = '';
            } else {
                errorAlert.innerText = data.error || 'Không thể gửi yêu cầu. Vui lòng kiểm tra lại email.';
                errorAlert.style.display = 'block';
            }
        } catch (error) {
            errorAlert.innerText = 'Lỗi kết nối đến máy chủ.';
            errorAlert.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Gửi mã xác nhận';
        }
    });
</script>
</body>
</html>
